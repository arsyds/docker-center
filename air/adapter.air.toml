# air config for api-adapter (nobu)
# usage (from the api-adapter repo dir):
#   air -c ../docker-center/air/adapter.air.toml

root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd"
  bin = "./tmp/main"
  full_bin = "./tmp/main --config=api-adapter-nobu-config.local.yaml"

  include_ext = ["go", "tpl", "tmpl", "html", "yaml", "toml"]
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "wiki"]
  include_dir = []
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false

  delay = 1000
  kill_delay = "500ms"
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = false

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true
